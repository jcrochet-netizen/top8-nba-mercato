<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Top 8 — Rumeurs mercato NBA</title>
<style>
  :root{
    --bg:#ffffff; --panel:#f6f7f9; --panel2:#ffffff; --line:#e3e7ec;
    --txt:#14181f; --muted:#6b7682; --accent:#c8102e; --accent2:#1d428a;
    --gold:#e0a200; --silver:#8a93a0; --bronze:#c07a3e;
    --shadow:0 6px 22px rgba(15,23,42,.14);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  body{
    background:var(--bg); color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    display:flex; justify-content:center; padding:14px;
  }
  .wrap{width:100%; max-width:620px}

  header{margin-bottom:12px; text-align:center}
  header h1{margin:0; font-size:18px; letter-spacing:.2px}
  header h1 b{color:var(--accent)}
  header p{margin:4px 0 0; font-size:12px; color:var(--muted)}

  .board{display:grid; grid-template-columns:minmax(0,1fr) minmax(0,1fr); gap:10px}
  .col{min-width:0; background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:10px}
  .col h2{
    margin:0 0 9px; font-size:11px; text-transform:uppercase; letter-spacing:1.2px;
    color:var(--muted); display:flex; align-items:center; gap:6px;
  }
  .col h2 .cnt{margin-left:auto; color:var(--accent); font-weight:700}

  /* ---- Pool (left) ---- */
  #pool{min-height:80px; display:flex; flex-direction:column; gap:7px}
  .card{
    display:flex; align-items:center; gap:8px; background:var(--panel2);
    border:1px solid var(--line); border-radius:10px; padding:6px 8px;
    cursor:grab; touch-action:none; user-select:none; transition:transform .08s, border-color .15s;
  }
  .card:active{cursor:grabbing}
  .card .ph{
    width:40px; height:40px; border-radius:50%; flex:0 0 40px; overflow:hidden;
    background:#eef1f4; border:1px solid var(--line);
  }
  .card .ph img{width:100%; height:100%; object-fit:cover; object-position:50% 12%; display:block}
  .card .info{min-width:0; flex:1}
  .card .nm{font-size:12.5px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .card .ru{font-size:11px; color:var(--accent); margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .card .grip{color:#b3bbc5; font-size:14px; margin-left:2px}

  /* ---- Ranking (right) ---- */
  #ranking{display:flex; flex-direction:column; gap:6px}
  .slot{
    display:flex; align-items:center; gap:8px; min-height:50px;
    border:1px dashed var(--line); border-radius:10px; padding:5px 7px;
    background:rgba(15,23,42,.02); transition:border-color .15s, background .15s;
  }
  .slot .rank{flex:0 0 22px; text-align:center; font-weight:800; font-size:15px; color:var(--muted); font-variant-numeric:tabular-nums}
  .slot[data-rank="1"] .rank{color:var(--gold)}
  .slot[data-rank="2"] .rank{color:var(--silver)}
  .slot[data-rank="3"] .rank{color:var(--bronze)}
  .slot .empty{flex:1; font-size:11px; color:var(--muted); opacity:.5}
  .slot.filled{border-style:solid; background:var(--panel2); box-shadow:0 1px 3px rgba(15,23,42,.06)}
  .slot.over{border-color:var(--accent); background:rgba(200,16,46,.07)}

  .slotcard{display:flex; align-items:center; gap:8px; flex:1; min-width:0; cursor:grab; touch-action:none}
  .slotcard:active{cursor:grabbing}
  .slotcard .ph{width:36px;height:36px;border-radius:50%;flex:0 0 36px;overflow:hidden;border:1px solid var(--line);background:#eef1f4}
  .slotcard .ph img{width:100%;height:100%;object-fit:cover;object-position:50% 12%;display:block}
  .slotcard .nm{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .slotcard .ru{font-size:10.5px;color:var(--accent);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .slot .rm{
    flex:0 0 auto; width:20px;height:20px;border-radius:50%;border:none;cursor:pointer;
    background:#eceff3;color:var(--muted);font-size:13px;line-height:1;display:flex;align-items:center;justify-content:center;
  }
  .slot .rm:hover{background:#fbe1e3;color:var(--accent)}

  /* drag clone */
  #drag-clone{position:fixed; z-index:9999; pointer-events:none; left:0; top:0; width:230px; box-shadow:var(--shadow); transform:translate(-50%,-50%) scale(1.03); opacity:.96}
  #drag-clone .card{background:var(--panel2);border:1px solid var(--accent);border-radius:10px;padding:6px 8px}
  body.dragging{cursor:grabbing}
  body.dragging #pool.over-pool{outline:2px dashed var(--accent); outline-offset:2px; border-radius:10px}

  .toolbar{display:flex; gap:8px; margin-top:12px; justify-content:center}
  .btn{border:1px solid var(--line); background:var(--panel2); color:var(--txt); font-size:12px; padding:7px 14px; border-radius:9px; cursor:pointer}
  .btn:hover{border-color:var(--accent)}

  .share{margin-top:14px; text-align:center}
  .share h4{margin:0 0 9px; font-size:11px; text-transform:uppercase; letter-spacing:1.2px; color:var(--muted); font-weight:700}
  .share-btns{display:flex; gap:9px; justify-content:center; flex-wrap:wrap}
  .sbtn{display:inline-flex; align-items:center; gap:7px; border:none; cursor:pointer; color:#fff; font-size:12px; font-weight:600; padding:9px 14px; border-radius:9px; transition:filter .15s, transform .05s}
  .sbtn:hover{filter:brightness(1.06)} .sbtn:active{transform:translateY(1px)}
  .sbtn svg{width:15px; height:15px; fill:currentColor}
  .sbtn.x{background:#111}
  .sbtn.fb{background:#1877f2}
  .sbtn.wa{background:#25d366}
  .sbtn.copy{background:#5b6776}
  .sbtn.nat{background:#0a7d57}
  .sbtn.dl{background:var(--accent)}
  .sbtn:disabled{opacity:.55; cursor:default}
  #shMsg{margin-top:8px; font-size:11px; color:var(--accent); min-height:14px; font-weight:600}
  .foot{margin-top:12px; text-align:center; font-size:10px; color:var(--muted)}

  /* ---------- MOBILE ---------- */
  @media (max-width:540px){
    body{padding:8px}
    header h1{font-size:15px}
    header p{font-size:10.5px; line-height:1.35}
    .board{gap:6px}
    .col{padding:7px; border-radius:11px}
    .col h2{font-size:9.5px; letter-spacing:.6px; margin-bottom:7px}
    #pool{gap:5px}
    .card{padding:5px; gap:6px; border-radius:9px}
    .card .ph{width:32px; height:32px; flex-basis:32px}
    .card .nm{font-size:11px}
    .card .ru{font-size:9.5px}
    .card .grip{display:none}
    #ranking{gap:5px}
    .slot{min-height:44px; padding:4px 5px; gap:5px}
    .slot .rank{flex-basis:16px; font-size:13px}
    .slot .empty{font-size:9.5px}
    .slotcard .ph{width:30px; height:30px; flex-basis:30px}
    .slotcard .nm{font-size:11px}
    .slotcard .ru{font-size:9.5px}
    .slot .rm{width:18px; height:18px; font-size:11px}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Top 8 — Rumeurs mercato <b>NBA</b></h1>
    <p>Glisse les 8 rumeurs pour composer ton classement, de la plus crédible à la plus folle.</p>
  </header>

  <div class="board">
    <section class="col">
      <h2>Rumeurs <span class="cnt" id="poolCnt">8</span></h2>
      <div id="pool"></div>
    </section>
    <section class="col">
      <h2>Mon Top 8 <span class="cnt" id="rankCnt">0/8</span></h2>
      <div id="ranking"></div>
    </section>
  </div>

  <div class="toolbar">
    <button class="btn" id="resetBtn">Réinitialiser</button>
  </div>

  <div class="share">
    <h4>Partager mon Top 8</h4>
    <div class="share-btns">
      <button class="sbtn x"  id="shX"  type="button"><svg viewBox="0 0 24 24"><path d="M18.9 1.6h3.7l-8 9.1L24 22.4h-7.4l-5.8-7.6-6.6 7.6H.5l8.6-9.8L0 1.6h7.6l5.2 6.9 6.1-6.9Zm-1.3 18.6h2L6.5 3.7H4.3l13.3 16.5Z"/></svg>X</button>
      <button class="sbtn fb" id="shFb" type="button"><svg viewBox="0 0 24 24"><path d="M24 12a12 12 0 1 0-13.9 11.9v-8.4H7v-3.5h3.1V9.4c0-3 1.8-4.7 4.5-4.7 1.3 0 2.7.2 2.7.2v3h-1.5c-1.5 0-2 .9-2 1.9v2.2h3.4l-.5 3.5h-2.9v8.4A12 12 0 0 0 24 12Z"/></svg>Facebook</button>
      <button class="sbtn wa" id="shWa" type="button"><svg viewBox="0 0 24 24"><path d="M.1 24l1.7-6.2A11.9 11.9 0 1 1 12 24a12 12 0 0 1-5.9-1.6L.1 24Zm6.3-3.9.4.2a9.9 9.9 0 0 0 5.2 1.4 9.9 9.9 0 1 0-8.4-4.6l.3.4-1 3.7 3.5-1.1ZM17.5 14c-.1-.2-.5-.4-1-.6-.5-.3-2.9-1.4-3.3-1.6-.4-.2-.8-.2-1.1.2-.3.5-1.2 1.6-1.5 1.9-.3.3-.5.3-1 .1-3-1.5-4.9-2.6-6.9-5.9-.5-.9.5-.8 1.5-2.8.1-.3.1-.6 0-.8-.2-.2-1.1-2.6-1.5-3.6-.4-.9-.8-.8-1.1-.8h-.9c-.3 0-.8.1-1.2.6-.4.5-1.6 1.6-1.6 3.9 0 2.3 1.7 4.5 1.9 4.8.2.3 3.3 5 8 7 3 1.2 4.1 1.3 5.5 1.1.9-.1 2.9-1.2 3.3-2.3.4-1.1.4-2.1.3-2.3Z"/></svg>WhatsApp</button>
      <button class="sbtn copy" id="shCopy" type="button"><svg viewBox="0 0 24 24"><path d="M16 1H4a2 2 0 0 0-2 2v14h2V3h12V1Zm3 4H8a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h11a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2Zm0 16H8V7h11v14Z"/></svg><span>Copier</span></button>
      <button class="sbtn nat" id="shNative" type="button" hidden><svg viewBox="0 0 24 24"><path d="M18 16.1c-.8 0-1.5.3-2 .8l-7-4.1c.1-.2.1-.5.1-.8s0-.6-.1-.8l7-4.1c.5.5 1.2.8 2 .8a3 3 0 1 0-3-3c0 .3 0 .6.1.8L8 9.8a3 3 0 1 0 0 4.4l7.1 4.2c-.1.2-.1.5-.1.7a2.9 2.9 0 1 0 3-2.9Z"/></svg><span>Partager</span></button>
      <button class="sbtn dl" id="shImg" type="button"><svg viewBox="0 0 24 24"><path d="M12 16l-5-5 1.4-1.4L11 12.2V3h2v9.2l2.6-2.6L17 11l-5 5Zm-7 3h14v2H5v-2Z"/></svg><span>Télécharger l'image</span></button>
    </div>
    <div id="shMsg"></div>
  </div>

  <div class="foot">Données : balldontlie.io · Photos : NBA</div>
</div>

<script>
const ITEMS = [
  {id:"lebron",  name:"LeBron James",          rumor:"quitte les Lakers",     img:"img/lebron.png"},
  {id:"kawhi",   name:"Kawhi Leonard",         rumor:"revient aux Raptors",   img:"img/kawhi.png"},
  {id:"morant",  name:"Ja Morant",             rumor:"transféré aux Blazers", img:"img/morant.png"},
  {id:"giannis", name:"Giannis Antetokounmpo", rumor:"débarque au Heat",      img:"img/giannis.png"},
  {id:"lamelo",  name:"LaMelo Ball",           rumor:"transféré aux Wolves",  img:"img/lamelo.png"},
  {id:"randle",  name:"Julius Randle",         rumor:"envoyé aux Nets",       img:"img/randle.png"},
  {id:"bridges", name:"Miles Bridges",         rumor:"bradé aux Suns",        img:"img/bridges.png"},
  {id:"kuminga", name:"Jonathan Kuminga",      rumor:"libéré",                img:"img/kuminga.png"},
];
const SLOTS = 8;

const byId = Object.fromEntries(ITEMS.map(p=>[p.id,p]));
let pool = ITEMS.map(p=>p.id);
let ranking = new Array(SLOTS).fill(null);

const $pool = document.getElementById('pool');
const $rank = document.getElementById('ranking');

function photo(p){ return `<div class="ph"><img src="${p.img}" alt="" loading="lazy" onerror="this.remove()"></div>`; }

function render(){
  $pool.innerHTML = pool.map(id=>{
    const p = byId[id];
    return `<div class="card" data-id="${id}" data-from="pool">
      ${photo(p)}
      <div class="info"><div class="nm">${p.name}</div><div class="ru">${p.rumor}</div></div>
      <div class="grip">⠿</div>
    </div>`;
  }).join('') || `<div style="font-size:11px;color:var(--muted);opacity:.6;padding:6px">Tout est classé ✓</div>`;

  $rank.innerHTML = ranking.map((id,i)=>{
    const r = i+1;
    if(id==null){
      return `<div class="slot" data-rank="${r}" data-slot="${i}"><div class="rank">${r}</div><div class="empty">Glisse une rumeur ici</div></div>`;
    }
    const p = byId[id];
    return `<div class="slot filled" data-rank="${r}" data-slot="${i}">
      <div class="rank">${r}</div>
      <div class="slotcard" data-id="${id}" data-from="${i}">
        ${photo(p)}
        <div class="info" style="min-width:0;flex:1"><div class="nm">${p.name}</div><div class="ru">${p.rumor}</div></div>
      </div>
      <button class="rm" title="Retirer" data-remove="${i}">✕</button>
    </div>`;
  }).join('');

  document.getElementById('poolCnt').textContent = pool.length;
  document.getElementById('rankCnt').textContent = ranking.filter(Boolean).length + '/'+SLOTS;
}

/* placement */
function firstEmptySlot(){ return ranking.indexOf(null); }
function moveToSlot(id, from, targetSlot){
  if(from==='pool'){ pool = pool.filter(x=>x!==id); } else { ranking[Number(from)] = null; }
  const occ = ranking[targetSlot];
  ranking[targetSlot] = id;
  if(occ!=null && occ!==id){
    if(from==='pool'){ if(!pool.includes(occ)) pool.unshift(occ); }
    else { ranking[Number(from)] = occ; }
  }
}
function moveToPool(id, from){ if(from==='pool') return; ranking[Number(from)] = null; if(!pool.includes(id)) pool.push(id); }

/* pointer drag & drop */
let drag = null; const THRESH = 6;
function point(e){ return {x:e.clientX, y:e.clientY}; }
function onDown(e){
  const handle = e.target.closest('.card, .slotcard');
  if(!handle || e.target.closest('.rm')) return;
  const id = handle.dataset.id, from = handle.dataset.from;
  const pt = point(e);
  drag = {id, from, startX:pt.x, startY:pt.y, started:false, clone:null, src:handle};
  window.addEventListener('pointermove', onMove, {passive:false});
  window.addEventListener('pointerup', onUp, {passive:false});
}
function startDrag(){
  drag.started = true; document.body.classList.add('dragging'); drag.src.style.opacity='.35';
  const p = byId[drag.id], clone = document.createElement('div'); clone.id='drag-clone';
  clone.innerHTML = `<div class="card">${photo(p)}<div class="info"><div class="nm">${p.name}</div><div class="ru">${p.rumor}</div></div></div>`;
  document.body.appendChild(clone); drag.clone = clone;
}
function onMove(e){
  if(!drag) return; const pt = point(e);
  if(!drag.started){ if(Math.hypot(pt.x-drag.startX, pt.y-drag.startY) < THRESH) return; startDrag(); }
  e.preventDefault();
  drag.clone.style.left = pt.x+'px'; drag.clone.style.top = pt.y+'px';
  highlight(pt);
}
function elUnder(pt){ drag.clone.style.display='none'; const el=document.elementFromPoint(pt.x,pt.y); drag.clone.style.display=''; return el; }
function dropTarget(pt){
  const el = elUnder(pt); if(!el) return null;
  const slot = el.closest('.slot'); if(slot) return {type:'slot', idx:Number(slot.dataset.slot)};
  if(el.closest('#pool')) return {type:'pool'}; return null;
}
function highlight(pt){
  document.querySelectorAll('.slot.over').forEach(s=>s.classList.remove('over'));
  $pool.classList.remove('over-pool');
  const t = dropTarget(pt); if(!t) return;
  if(t.type==='slot') $rank.children[t.idx].classList.add('over'); else $pool.classList.add('over-pool');
}
function onUp(e){
  window.removeEventListener('pointermove', onMove); window.removeEventListener('pointerup', onUp);
  if(!drag) return; if(!drag.started){ drag=null; return; }
  const t = dropTarget(point(e));
  if(t){ if(t.type==='slot') moveToSlot(drag.id, drag.from, t.idx); else moveToPool(drag.id, drag.from); }
  cleanup(); render();
}
function cleanup(){ document.body.classList.remove('dragging'); if(drag && drag.clone) drag.clone.remove(); drag=null; }

document.addEventListener('click', e=>{
  const rm = e.target.closest('[data-remove]');
  if(rm){ moveToPool(ranking[Number(rm.dataset.remove)], rm.dataset.remove); render(); }
});
$pool.addEventListener('dblclick', e=>{
  const c = e.target.closest('.card'); if(!c) return;
  const s = firstEmptySlot(); if(s<0) return; moveToSlot(c.dataset.id, 'pool', s); render();
});
document.addEventListener('pointerdown', onDown);
document.getElementById('resetBtn').addEventListener('click', ()=>{ pool = ITEMS.map(p=>p.id); ranking = new Array(SLOTS).fill(null); render(); });

/* ---------- partage ---------- */
const CONFIG = { shareUrl:"", hashtags:"NBA,Mercato" };
let HOST_URL = "";
try{ if(document.referrer){ const r=new URL(document.referrer); if(r.origin!==location.origin) HOST_URL=document.referrer; } }catch(_){}
const shareUrl = () => HOST_URL || CONFIG.shareUrl || location.href;
function rankedItems(){ return ranking.filter(Boolean).map(id=>byId[id]); }
function shareText(){
  const list = rankedItems();
  if(!list.length) return "Compose ton Top 8 des rumeurs mercato NBA !";
  let t = "Mon Top 8 des rumeurs mercato NBA :\n";
  list.forEach((p,i)=>{ t += `${i+1}. ${p.name} ${p.rumor}\n`; });
  return t.trim();
}
const openShare = u => window.open(u, '_blank', 'noopener,noreferrer');
function flash(m){ const el=document.getElementById('shMsg'); el.textContent=m; clearTimeout(flash._t); flash._t=setTimeout(()=>el.textContent='',3000); }
document.getElementById('shX').addEventListener('click', ()=>openShare(`https://twitter.com/intent/tweet?text=${encodeURIComponent(shareText())}&url=${encodeURIComponent(shareUrl())}&hashtags=${encodeURIComponent(CONFIG.hashtags)}`));
document.getElementById('shFb').addEventListener('click', ()=>openShare(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(shareUrl())}&quote=${encodeURIComponent(shareText())}`));
document.getElementById('shWa').addEventListener('click', ()=>openShare(`https://wa.me/?text=${encodeURIComponent(shareText()+'\n'+shareUrl())}`));
document.getElementById('shCopy').addEventListener('click', async ()=>{
  const txt = shareText()+'\n'+shareUrl();
  try{ await navigator.clipboard.writeText(txt); flash('✓ Texte copié !'); }
  catch(_){ const ta=document.createElement('textarea'); ta.value=txt; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); flash('✓ Texte copié !'); }
});

/* ---------- image (canvas) ---------- */
const FONT='system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif';
function rrect(ctx,x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function loadImg(src){ return new Promise(res=>{ const im=new Image(); im.crossOrigin='anonymous'; im.onload=()=>res(im); im.onerror=()=>res(null); im.src=src; }); }
function ellipsize(ctx,t,maxW){ if(ctx.measureText(t).width<=maxW) return t; let s=t; while(s.length>1 && ctx.measureText(s+'…').width>maxW) s=s.slice(0,-1); return s+'…'; }
function drawAvatar(ctx,im,cx,cy,r){
  ctx.save(); ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.closePath(); ctx.fillStyle='#eef1f4'; ctx.fill(); ctx.clip();
  if(im){ const s=r*2, sw=im.width, sh=im.height, ar=sw/sh; let dw=s, dh=s; if(ar>1){ dh=s; dw=s*ar; } else { dw=s; dh=s/ar; }
    ctx.drawImage(im, cx-dw/2, cy-r-(dh-s)*0.12, dw, dh); }
  ctx.restore(); ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.lineWidth=1.5; ctx.strokeStyle='#e3e7ec'; ctx.stroke();
}
async function buildCanvas(){
  const list = rankedItems();
  const imgs = {}; await Promise.all(list.map(async p=>{ imgs[p.id]=await loadImg(p.img); }));
  const RED='#c8102e', INK='#14181f', MUT='#6b7682';
  const scale=2, W=680, pad=40, headH=118, rowH=64, rowGap=8, listTop=headH+8, footerH=54;
  const n=Math.max(list.length,1), H=listTop + n*rowH + (n-1)*rowGap + footerH;
  const cv=document.createElement('canvas'); cv.width=W*scale; cv.height=H*scale;
  const ctx=cv.getContext('2d'); ctx.scale(scale,scale);
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,H);
  ctx.textBaseline='alphabetic';
  const t1='Top 8 — Rumeurs mercato ', t2='NBA';
  ctx.font='800 27px '+FONT; const w1=ctx.measureText(t1).width, w2=ctx.measureText(t2).width; let tx=(W-(w1+w2))/2;
  ctx.textAlign='left'; ctx.fillStyle=INK; ctx.fillText(t1,tx,54); ctx.fillStyle=RED; ctx.fillText(t2,tx+w1,54);
  ctx.textAlign='center'; ctx.fillStyle=MUT; ctx.font='400 13px '+FONT;
  ctx.fillText('Mon classement des rumeurs du mercato NBA', W/2, 80);
  ctx.strokeStyle='#e3e7ec'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(pad,100); ctx.lineTo(W-pad,100); ctx.stroke();
  if(!list.length){ ctx.textAlign='center'; ctx.fillStyle=MUT; ctx.font='600 16px '+FONT; ctx.fillText('Aucune rumeur classée.', W/2, listTop+40); }
  const medal=['#e0a200','#8a93a0','#c07a3e'];
  list.forEach((p,i)=>{
    const y=listTop+i*(rowH+rowGap);
    ctx.save(); rrect(ctx,pad,y,W-2*pad,rowH,12); ctx.fillStyle='#fff'; ctx.fill(); ctx.lineWidth=1; ctx.strokeStyle='#e3e7ec'; ctx.stroke(); ctx.restore();
    ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillStyle=i<3?medal[i]:MUT; ctx.font='800 23px '+FONT;
    ctx.fillText(String(i+1), pad+30, y+rowH/2+1);
    drawAvatar(ctx, imgs[p.id], pad+80, y+rowH/2, 24);
    const nx=pad+118; ctx.textAlign='left';
    ctx.fillStyle=INK; ctx.font='700 17px '+FONT; ctx.textBaseline='alphabetic'; ctx.fillText(ellipsize(ctx,p.name,W-2*pad-170), nx, y+27);
    ctx.fillStyle=RED; ctx.font='600 13.5px '+FONT; ctx.fillText(ellipsize(ctx,p.rumor,W-2*pad-170), nx, y+47);
  });
  ctx.textAlign='center'; ctx.textBaseline='alphabetic'; ctx.fillStyle=MUT; ctx.font='400 12px '+FONT;
  ctx.fillText('Données : balldontlie.io · Photos : NBA', W/2, H-20);
  return cv;
}
const canvasToBlob = cv => new Promise(r=>cv.toBlob(r,'image/png'));
async function downloadImage(){
  const b=document.getElementById('shImg'), old=b.innerHTML; b.disabled=true; b.textContent='Génération…';
  try{ const cv=await buildCanvas(); const a=document.createElement('a'); a.download='top8-mercato-nba.png'; a.href=cv.toDataURL('image/png'); a.click(); flash('✓ Image téléchargée !'); }
  catch(err){ flash('Erreur lors de la génération'); console.error(err); }
  finally{ b.disabled=false; b.innerHTML=old; }
}
async function shareNative(){
  const b=document.getElementById('shNative'), old=b.innerHTML; b.disabled=true; b.textContent='Préparation…';
  try{
    const cv=await buildCanvas(); const blob=await canvasToBlob(cv);
    const file=new File([blob],'top8-mercato-nba.png',{type:'image/png'}); const text=shareText()+'\n'+shareUrl();
    if(navigator.canShare && navigator.canShare({files:[file]})) await navigator.share({title:'Top 8 — Rumeurs mercato NBA', text, files:[file]});
    else if(navigator.share) await navigator.share({title:'Top 8 — Rumeurs mercato NBA', text:shareText(), url:shareUrl()});
    else { const a=document.createElement('a'); a.download=file.name; a.href=cv.toDataURL('image/png'); a.click(); flash('✓ Image téléchargée !'); }
  }catch(err){ if(!err || err.name!=='AbortError'){ flash('Partage indisponible'); console.error(err); } }
  finally{ b.disabled=false; b.innerHTML=old; }
}
if(navigator.share){ document.getElementById('shNative').hidden=false; }
document.getElementById('shNative').addEventListener('click', shareNative);
document.getElementById('shImg').addEventListener('click', downloadImage);

/* ---------- auto-hauteur iframe ---------- */
function postHeight(){ if(window.parent===window) return; try{ window.parent.postMessage({type:'top8-height', height:document.documentElement.scrollHeight}, '*'); }catch(_){} }
window.addEventListener('load', postHeight); window.addEventListener('resize', postHeight);
if(window.ResizeObserver){ try{ new ResizeObserver(postHeight).observe(document.body); }catch(_){} }
setTimeout(postHeight, 300); setTimeout(postHeight, 1200);

render(); postHeight();
</script>
